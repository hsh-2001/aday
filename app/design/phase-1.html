<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinFlow - Money Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .modal-overlay { transition: opacity 0.2s ease-out; }
        .modal-content { transition: transform 0.2s ease-out; }
        [lucide] { vertical-align: middle; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between sticky top-0 z-10">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 p-2 rounded-lg">
                <i data-lucide="wallet" class="text-white w-5 h-5"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">FinFlow</h1>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="toggleModal(true)" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-full flex items-center gap-2 transition-all shadow-md shadow-indigo-100">
                <i data-lucide="plus" class="w-4 h-4"></i>
                <span class="hidden sm:inline font-medium">Add Transaction</span>
            </button>
            <div class="w-10 h-10 rounded-full bg-slate-200 border-2 border-white shadow-sm overflow-hidden">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="avatar">
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 space-y-8">
        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 relative overflow-hidden group">
                <div class="absolute right-[-10px] top-[-10px] bg-slate-50 rounded-full w-24 h-24 -z-0 group-hover:scale-110 transition-transform"></div>
                <div class="relative z-10">
                    <p class="text-slate-500 text-sm font-medium">Total Balance</p>
                    <h2 id="total-balance" class="text-3xl font-bold mt-1">$0.00</h2>
                    <div class="mt-4 flex items-center gap-2 text-xs font-semibold text-emerald-600 bg-emerald-50 w-fit px-2 py-1 rounded">
                        <i data-lucide="trending-up" class="w-3 h-3"></i>
                        +2.5% this month
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex items-center gap-3 mb-4">
                    <div class="p-2 bg-emerald-100 rounded-lg text-emerald-600">
                        <i data-lucide="arrow-up-right" class="w-5 h-5"></i>
                    </div>
                    <p class="text-slate-500 text-sm font-medium">Income</p>
                </div>
                <h2 id="total-income" class="text-2xl font-bold text-emerald-600">$0.00</h2>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex items-center gap-3 mb-4">
                    <div class="p-2 bg-rose-100 rounded-lg text-rose-600">
                        <i data-lucide="arrow-down-left" class="w-5 h-5"></i>
                    </div>
                    <p class="text-slate-500 text-sm font-medium">Expenses</p>
                </div>
                <h2 id="total-expense" class="text-2xl font-bold text-rose-600">$0.00</h2>
            </div>
        </div>

        <!-- Content Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Transactions List -->
            <div class="lg:col-span-2 space-y-4">
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-bold">Recent Transactions</h3>
                    <div class="flex gap-2">
                        <button class="p-2 hover:bg-slate-200 rounded-lg transition-colors">
                            <i data-lucide="search" class="w-4 h-4 text-slate-500"></i>
                        </button>
                        <button class="p-2 hover:bg-slate-200 rounded-lg transition-colors">
                            <i data-lucide="filter" class="w-4 h-4 text-slate-500"></i>
                        </button>
                    </div>
                </div>

                <div id="transaction-list" class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden divide-y divide-slate-50">
                    <!-- Transactions will be injected here -->
                </div>
            </div>

            <!-- Sidebar Info -->
            <div class="space-y-6">
                <div class="bg-slate-900 text-white p-6 rounded-3xl shadow-xl shadow-slate-200 relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-20">
                        <i data-lucide="pie-chart" class="w-20 h-20"></i>
                    </div>
                    <h4 class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-4">Quick Analysis</h4>
                    <p class="text-sm leading-relaxed mb-6">
                        You've spent <span class="text-rose-400 font-bold">15% more</span> on groceries than last week. Consider looking for discounts!
                    </p>
                    <button class="w-full bg-white/10 hover:bg-white/20 py-2 rounded-xl text-sm font-medium transition-colors backdrop-blur-sm">
                        View Reports
                    </button>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h4 class="font-bold mb-4">Categories</h4>
                    <div id="category-list" class="space-y-3">
                        <!-- Categories injected here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Add Modal -->
    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="toggleModal(false)"></div>
        <div class="bg-white rounded-3xl w-full max-w-md relative z-10 shadow-2xl overflow-hidden scale-95 opacity-0 transition-all duration-200" id="modal-content">
            <div class="p-6 border-b border-slate-100 flex items-center justify-between">
                <h2 class="text-xl font-bold">New Transaction</h2>
                <button onclick="toggleModal(false)" class="p-2 hover:bg-slate-100 rounded-full">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <form id="transaction-form" class="p-6 space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">Title</label>
                    <input id="form-title" required type="text" placeholder="Rent, Salary, etc." class="w-full px-4 py-3 bg-slate-50 rounded-xl border-none focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">Amount ($)</label>
                        <input id="form-amount" required type="number" step="0.01" placeholder="0.00" class="w-full px-4 py-3 bg-slate-50 rounded-xl border-none focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">Type</label>
                        <select id="form-type" class="w-full px-4 py-3 bg-slate-50 rounded-xl border-none focus:ring-2 focus:ring-indigo-500 outline-none appearance-none">
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">Category</label>
                        <select id="form-category" class="w-full px-4 py-3 bg-slate-50 rounded-xl border-none focus:ring-2 focus:ring-indigo-500 outline-none appearance-none">
                            <option value="General">General</option>
                            <option value="Work">Work</option>
                            <option value="Food">Food</option>
                            <option value="Lifestyle">Lifestyle</option>
                            <option value="Housing">Housing</option>
                            <option value="Investment">Investment</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">Date</label>
                        <input id="form-date" required type="date" class="w-full px-4 py-3 bg-slate-50 rounded-xl border-none focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                </div>

                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-bold mt-4 shadow-lg shadow-indigo-100 transition-all active:scale-95">
                    Save Transaction
                </button>
            </form>
        </div>
    </div>

    <script>
        // Initial Data
        let transactions = [
            { id: 1, title: 'Freelance Design', amount: 2500, type: 'income', category: 'Work', date: '2023-10-24' },
            { id: 2, title: 'Grocery Shopping', amount: 85.50, type: 'expense', category: 'Food', date: '2023-10-23' },
            { id: 3, title: 'Monthly Rent', amount: 1200, type: 'expense', category: 'Housing', date: '2023-10-01' },
            { id: 4, title: 'Stock Dividends', amount: 150, type: 'income', category: 'Investment', date: '2023-10-20' },
            { id: 5, title: 'Coffee Shop', amount: 5.75, type: 'expense', category: 'Lifestyle', date: '2023-10-25' },
        ];

        // UI Elements
        const transactionList = document.getElementById('transaction-list');
        const totalBalanceEl = document.getElementById('total-balance');
        const totalIncomeEl = document.getElementById('total-income');
        const totalExpenseEl = document.getElementById('total-expense');
        const categoryListEl = document.getElementById('category-list');
        const modal = document.getElementById('modal');
        const modalContent = document.getElementById('modal-content');
        const transactionForm = document.getElementById('transaction-form');

        // Toggle Modal
        function toggleModal(show) {
            if (show) {
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modalContent.classList.remove('scale-95', 'opacity-0');
                    modalContent.classList.add('scale-100', 'opacity-100');
                }, 10);
                document.getElementById('form-date').value = new Date().toISOString().split('T')[0];
            } else {
                modalContent.classList.remove('scale-100', 'opacity-100');
                modalContent.classList.add('scale-95', 'opacity-0');
                setTimeout(() => modal.classList.add('hidden'), 200);
            }
        }

        // Render Functions
        function render() {
            // Update Totals
            const totals = transactions.reduce((acc, curr) => {
                if (curr.type === 'income') acc.income += curr.amount;
                else acc.expense += curr.amount;
                return acc;
            }, { income: 0, expense: 0 });
            
            const balance = totals.income - totals.expense;

            totalBalanceEl.textContent = `$${balance.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            totalIncomeEl.textContent = `$${totals.income.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            totalExpenseEl.textContent = `$${totals.expense.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

            // Update List
            transactionList.innerHTML = transactions.length === 0 
                ? '<div class="p-12 text-center text-slate-400">No transactions yet.</div>'
                : transactions.map(t => `
                    <div class="p-4 hover:bg-slate-50 transition-colors flex items-center justify-between group">
                        <div class="flex items-center gap-4">
                            <div class="p-3 rounded-xl ${t.type === 'income' ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-100 text-slate-600'}">
                                <i data-lucide="${getIcon(t.category)}" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <p class="font-semibold text-slate-800">${t.title}</p>
                                <p class="text-xs text-slate-500 flex items-center gap-1">
                                    <i data-lucide="calendar" class="w-3 h-3"></i> ${t.date} • ${t.category}
                                </p>
                            </div>
                        </div>
                        <div class="font-bold ${t.type === 'income' ? 'text-emerald-600' : 'text-slate-900'}">
                            ${t.type === 'income' ? '+' : '-'}$${t.amount.toFixed(2)}
                        </div>
                    </div>
                `).join('');

            // Update Categories
            const cats = ['Food', 'Work', 'Lifestyle', 'Housing'];
            categoryListEl.innerHTML = cats.map(cat => `
                <div class="flex items-center justify-between group cursor-pointer">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-indigo-500"></div>
                        <span class="text-sm text-slate-600 group-hover:text-slate-900 transition-colors">${cat}</span>
                    </div>
                    <span class="text-xs font-bold text-slate-400">
                        ${transactions.filter(t => t.category === cat).length} items
                    </span>
                </div>
            `).join('');

            // Re-initialize Icons
            lucide.createIcons();
        }

        function getIcon(category) {
            switch(category) {
                case 'Work': return 'trending-up';
                case 'Food': return 'search';
                case 'Housing': return 'home';
                case 'Investment': return 'pie-chart';
                default: return 'credit-card';
            }
        }

        // Form Handling
        transactionForm.onsubmit = (e) => {
            e.preventDefault();
            const newT = {
                id: Date.now(),
                title: document.getElementById('form-title').value,
                amount: parseFloat(document.getElementById('form-amount').value),
                type: document.getElementById('form-type').value,
                category: document.getElementById('form-category').value,
                date: document.getElementById('form-date').value
            };

            transactions = [newT, ...transactions];
            transactionForm.reset();
            toggleModal(false);
            render();
        };

        // Initialize
        window.onload = () => {
            render();
        };
    </script>
</body>
</html>
